<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nice Try</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0a0e14;
    color:#e8f0f8;
    font-family:'Syne',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    overflow:hidden;
  }
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);
    background-size:40px 40px;
    pointer-events:none;
  }
  .container {
    position:relative;
    z-index:1;
    padding:40px;
    max-width:700px;
  }
  .emoji {
    font-size:5rem;
    margin-bottom:24px;
    animation:bounce 1s infinite alternate;
  }
  @keyframes bounce {
    from { transform:translateY(0); }
    to   { transform:translateY(-16px); }
  }
  h1 {
    font-size:clamp(1.8rem,5vw,3rem);
    font-weight:800;
    line-height:1.2;
    margin-bottom:20px;
  }
  h1 span { color:#00d4ff; }
  .sub {
    font-family:'IBM Plex Mono',monospace;
    font-size:0.85rem;
    color:#7a9bb5;
    margin-top:16px;
    line-height:1.8;
  }
  .lock {
    display:inline-block;
    margin-top:32px;
    font-family:'IBM Plex Mono',monospace;
    font-size:0.75rem;
    color:#00ff9d;
    border:1px solid rgba(0,255,157,0.2);
    background:rgba(0,255,157,0.05);
    padding:8px 20px;
    border-radius:20px;
  }
  .particles {
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
  }
  .particle {
    position:absolute;
    font-size:1.5rem;
    animation:fall linear infinite;
    opacity:0.6;
  }
  @keyframes fall {
    from { transform:translateY(-50px) rotate(0deg); opacity:0.8; }
    to   { transform:translateY(110vh) rotate(360deg); opacity:0; }
  }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="container">
  <div class="emoji">😂</div>
  <h1>ha ha, i moved the site<br>and password protected it<br><span>suckas!!!!</span></h1>
  <p class="sub">
    Nothing to see here.<br>
    Move along.<br>
    Seriously, go away.
  </p>
  <div class="lock">🔒 &nbsp; access denied &nbsp; 🔒</div>
</div>

<script>
  var emojis = ['😂','🔒','🚫','👋','💨','🤣','✌️','😎','🙅','🚪'];
  var p = document.getElementById('particles');
  for (var i=0; i<20; i++) {
    var el = document.createElement('div');
    el.className = 'particle';
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left = Math.random()*100+'vw';
    el.style.animationDuration = (4+Math.random()*6)+'s';
    el.style.animationDelay = (-Math.random()*8)+'s';
    el.style.fontSize = (1+Math.random()*2)+'rem';
    p.appendChild(el);
  }
</script>
</body>
</html>
